name: Test tap-healthchecksio

on:
  push:
    branches: [main]
    paths:
    - tap_healthchecksio/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  pull_request:
    paths:
    - tap_healthchecksio/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.17
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.55.0
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.2

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp

  test:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run tests
      env:
        TAP_HEALTHCHECKSIO_API_KEY: ${{ secrets.TAP_HEALTHCHECKSIO_API_KEY }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
        uvx
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox -e "${MATRIX_PYTHON_VERSION}"

  lint:
    name: Static type checking and unused dependencies
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
    - run: uv tool install --with tox-uv=="${TOX_UV_VERSION}" --from tox=="${TOX_VERSION}" tox
    - name: Static type checking
      run: tox -e typing
    - name: Unused, missing and transitive dependencies
      run: tox -e dependencies
